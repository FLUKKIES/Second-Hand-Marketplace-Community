services:
    # ── Dev infrastructure ────────────────────────────────
    # Usage: docker compose --profile dev up -d
    postgres:
        profiles: [dev]
        image: pgvector/pgvector:pg16
        container_name: marketplace-db
        restart: always
        env_file:
            - .env
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        ports:
            - "${POSTGRES_PORT}:5432"
        volumes:
            - pgdata:/var/lib/postgresql/data
        networks:
            - marketplace-network

    pgadmin:
        profiles: [dev]
        image: dpage/pgadmin4
        container_name: marketplace-pgadmin
        env_file:
            - .env
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
        ports:
            - "${PGADMIN_PORT}:80"
        depends_on:
            - postgres
        volumes:
            - pgadmin_data:/var/lib/pgadmin
        networks:
            - marketplace-network

    # ── Production (GCP VM) ───────────────────────────────
    # Usage: docker compose --profile prod up -d
    backend:
        profiles: [prod]
        build:
            context: ./backend
            dockerfile: Dockerfile
        container_name: marketplace-backend
        restart: always
        env_file:
            - ./backend/.env
        volumes:
            - uploads_data:/app/public/uploads
        networks:
            - marketplace-network

    frontend:
        profiles: [prod]
        build:
            context: ./frontend
            dockerfile: Dockerfile
        container_name: marketplace-frontend
        restart: always
        env_file:
            - ./frontend/.env
        depends_on:
            - backend
        networks:
            - marketplace-network

    nginx:
        profiles: [prod]
        image: nginx:alpine
        container_name: marketplace-nginx
        restart: always
        volumes:
            - ./infra/gcp/nginx.gcp.conf:/etc/nginx/nginx.conf:ro
            - uploads_data:/app/public/uploads:ro
        ports:
            - "80:80"
        depends_on:
            - frontend
            - backend
        networks:
            - marketplace-network

volumes:
    pgdata:
    pgadmin_data:
    uploads_data:

networks:
    marketplace-network:
        driver: bridge