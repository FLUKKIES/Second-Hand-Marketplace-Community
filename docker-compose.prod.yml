services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: marketplace-prod-db
    restart: always
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata-prod:/var/lib/postgresql/data
    networks:
      - marketplace-prod-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: marketplace-prod-backend
    restart: always
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public"
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - marketplace-prod-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: marketplace-prod-frontend
    restart: always
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_API_URL: /api
    depends_on:
      - backend
    networks:
      - marketplace-prod-network

  nginx:
    image: nginx:alpine
    container_name: marketplace-prod-nginx
    restart: always
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    networks:
      - marketplace-prod-network

  ngrok:
    image: ngrok/ngrok:latest
    container_name: marketplace-prod-ngrok
    restart: unless-stopped
    command:
      - "http"
      - "nginx:80"
    environment:
      NGROK_AUTHTOKEN: ${NGROK_AUTHTOKEN}
    ports:
      - 4040:4040
    depends_on:
      - nginx
    networks:
      - marketplace-prod-network

volumes:
  pgdata-prod:


networks:
  marketplace-prod-network:
    driver: bridge
