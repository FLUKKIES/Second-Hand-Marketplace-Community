events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;

    server {
        listen 80;
        client_max_body_size 50M;
        
        # Proxy headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 1. Static Uploads — served directly by Nginx (faster, no backend load)
        #    Requires uploads_data_prod volume mounted at /app/public/uploads in nginx too
        location /uploads/ {
            alias /app/public/uploads/;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # 2. Main Application (Next.js)
        location / {
            proxy_pass http://frontend:3000;
        }

        # 3. pgAdmin (Database Management)
        location /pgadmin/ {
            proxy_pass http://pgadmin:80/pgadmin/;
            proxy_set_header X-Script-Name /pgadmin;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        # 3. API (NestJS)
        # Rewrite /api/xxx -> /xxx
        location /api/ {
            rewrite ^/api/(.*) /$1 break;
            proxy_pass http://backend:3001;
        }
        
        # 4. Socket.io (if used for Chat)
        location /socket.io/ {
            proxy_pass http://backend:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
